name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          PKG_TAG="v${{ steps.pkg.outputs.version }}"
          if [ "${{ github.ref_name }}" != "$PKG_TAG" ]; then
            echo "::error::Git tag '${{ github.ref_name }}' does not match package.json version '$PKG_TAG'"
            exit 1
          fi
          echo "Tag matches package.json version: $PKG_TAG"

      - name: Compute image tags
        id: tags
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            printf 'tags<<EOF\nariefsn/surat:${{ steps.pkg.outputs.version }}\nariefsn/surat:latest\nEOF\n' >> "$GITHUB_OUTPUT"
          else
            echo "tags=ariefsn/surat:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
